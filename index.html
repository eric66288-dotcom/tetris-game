<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>俄羅斯方塊</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="俄羅斯方塊小遊戲">
      <section class="game-shell">
        <div class="topbar">
          <div>
            <p class="eyebrow">Tetris</p>
            <h1>俄羅斯方塊</h1>
          </div>
          <button id="pauseBtn" class="icon-button" type="button" aria-label="暫停或繼續">Pause</button>
        </div>

        <div class="play-area">
          <canvas id="board" width="300" height="600" aria-label="遊戲棋盤"></canvas>
          <aside class="side-panel" aria-label="遊戲資訊">
            <div class="metric">
              <span>分數</span>
              <strong id="score">0</strong>
            </div>
            <div class="metric">
              <span>行數</span>
              <strong id="lines">0</strong>
            </div>
            <div class="metric">
              <span>等級</span>
              <strong id="level">1</strong>
            </div>
            <div class="next-box">
              <span>下一塊</span>
              <canvas id="next" width="120" height="120" aria-label="下一個方塊"></canvas>
            </div>
            <button id="restartBtn" class="primary-button" type="button">重新開始</button>
          </aside>
        </div>

        <div class="mobile-controls" aria-label="觸控操作">
          <button data-action="left" type="button" aria-label="左移">←</button>
          <button data-action="rotate" type="button" aria-label="旋轉">↻</button>
          <button data-action="right" type="button" aria-label="右移">→</button>
          <button data-action="drop" type="button" aria-label="快速落下">↓</button>
        </div>

        <p class="controls">鍵盤：← → 移動，↑ 旋轉，↓ 加速，空白鍵落到底，P 暫停。</p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
